<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HesmerciFx — Deriv Connected</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #fff;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .card {
      background: #111; border: 1px solid #222;
      border-radius: 20px; padding: 40px; max-width: 520px;
      width: 100%; text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .sub { color: #666; font-size: 14px; margin-bottom: 28px; }
    .token-box {
      background: #1a1a1a; border: 2px solid #eab308;
      border-radius: 12px; padding: 16px 20px;
      font-family: monospace; font-size: 13px;
      word-break: break-all; text-align: left;
      color: #eab308; margin-bottom: 16px;
    }
    .btn {
      display: inline-block; width: 100%;
      background: #eab308; color: #000;
      border: none; padding: 14px 24px;
      border-radius: 12px; font-weight: 900;
      font-size: 16px; cursor: pointer;
      margin-bottom: 10px; text-decoration: none;
    }
    .btn:hover { background: #fbbf24; }
    .btn-outline {
      background: transparent; border: 1px solid #333;
      color: #666; font-size: 14px; padding: 10px;
    }
    .acct { color: #888; font-size: 13px; margin-bottom: 20px; }
    #error { color: #ef4444; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="icon">⏳</div>
  <h1>Connecting...</h1>
  <p class="sub">Please wait</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token1');
  const acct  = params.get('acct1');
  const card  = document.getElementById('card');

  if (token && token.startsWith('a1-')) {
    // Store in localStorage so our frontend can pick it up
    localStorage.setItem('deriv_pending_token', token);
    localStorage.setItem('deriv_pending_acct', acct || '');

    card.innerHTML = `
      <div class="icon">✅</div>
      <h1>Deriv Connected!</h1>
      <p class="sub">Your trading token is ready</p>
      <p class="acct">Account: <strong>${acct || 'unknown'}</strong></p>
      <div class="token-box" id="tok">${token}</div>
      <button class="btn" onclick="copyToken()">📋 Copy Token</button>
      <a href="https://hesmerci.online" class="btn btn-outline">← Back to HesmerciFx</a>
    `;
  } else {
    card.innerHTML = `
      <div class="icon">❌</div>
      <h1>Connection Failed</h1>
      <p class="sub" id="error">No valid token received from Deriv.<br>Please try again.</p>
      <a href="https://hesmerci.online" class="btn" style="margin-top:20px">← Back</a>
    `;
  }

  function copyToken() {
    const tok = document.getElementById('tok').textContent.trim();
    navigator.clipboard.writeText(tok).then(() => {
      document.querySelector('.btn').textContent = '✅ Copied!';
      setTimeout(() => document.querySelector('.btn').textContent = '📋 Copy Token', 2000);
    });
  }
</script>
</body>
</html>
